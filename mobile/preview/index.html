<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MPP+ — Aperçu mobile</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: #121218;
        color: #e8e8ef;
        font-family: Inter, system-ui, sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 16px;
        min-height: 100%;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: #9aa0b4;
      }

      .toolbar button {
        border: 1px solid #2a2a38;
        background: #1a1a24;
        color: #e8e8ef;
        border-radius: 8px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 12px;
      }

      .toolbar button:hover {
        background: #242432;
      }

      .phone {
        width: 393px;
        height: 852px;
        max-height: calc(100vh - 80px);
        border-radius: 44px;
        border: 3px solid #2a2a38;
        background: #0a0a0f;
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.55),
          inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        overflow: hidden;
        position: relative;
        flex-shrink: 0;
      }

      .notch {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 28px;
        background: #121218;
        border-radius: 20px;
        z-index: 2;
        pointer-events: none;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #0a0a0f;
      }

      .status {
        font-size: 12px;
        color: #6b7288;
      }

      .status.error {
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <span>Aperçu iPhone (393×852)</span>
      <button type="button" id="reload">Recharger</button>
    </div>
    <div class="phone">
      <div class="notch" aria-hidden="true"></div>
      <iframe id="app" title="MPP+ mobile preview" src="http://localhost:8081"></iframe>
    </div>
    <p class="status" id="status">Connexion à Expo Web sur localhost:8081…</p>
    <script>
      const iframe = document.getElementById("app");
      const status = document.getElementById("status");
      const reloadBtn = document.getElementById("reload");

      reloadBtn.addEventListener("click", () => {
        iframe.src = iframe.src;
      });

      iframe.addEventListener("load", () => {
        status.textContent = "Connecté — les modifications se reflètent en direct (Fast Refresh).";
        status.classList.remove("error");
      });

      iframe.addEventListener("error", () => {
        status.textContent =
          "Impossible de joindre Expo. Lancez npm run preview dans mobile/.";
        status.classList.add("error");
      });
    </script>
  </body>
</html>
