<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#3d0a87"/>
    </linearGradient>
    <linearGradient id="ball" x1="160" y1="150" x2="360" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9D5FF"/>
    </linearGradient>
  </defs>

  <!-- rounded background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- crystal ball (prediction) -->
  <circle cx="256" cy="248" r="120" fill="url(#ball)"/>
  <!-- sheen -->
  <ellipse cx="212" cy="208" rx="38" ry="26" fill="#FFFFFF" opacity="0.65"/>
  <!-- base -->
  <path d="M176 372 q80 40 160 0 l-18 36 q-62 24 -124 0 z" fill="#C4B5FD"/>

  <!-- prediction check inside the ball -->
  <path d="M212 250 l28 30 l58 -68" stroke="#6D28D9" stroke-width="26"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- plus badge -->
  <circle cx="372" cy="156" r="52" fill="#22D3A6"/>
  <path d="M372 132 v48 M348 156 h48" stroke="#04372B" stroke-width="20" stroke-linecap="round"/>
</svg>
